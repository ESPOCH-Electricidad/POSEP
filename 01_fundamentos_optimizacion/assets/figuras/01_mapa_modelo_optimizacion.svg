<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="642" viewBox="0 0 1320 642"><rect width="100%" height="100%" fill="#ffffff"/><text x="60" y="52" font-family="Arial" font-size="34" font-weight="bold" fill="#0f172a">Del problema técnico al modelo matemático</text><text x="60" y="84" font-family="Arial" font-size="18" fill="#475569">Secuencia pedagógica para formular modelos de optimización</text><rect x="60" y="118" width="1200" height="56" rx="14" fill="#dbeafe" stroke="#334155" stroke-width="2"/><text x="90" y="141" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">1. Problema físico o económico</text><text x="430" y="141" font-family="Arial" font-size="15.5" fill="#334155">Identificar decisión, criterio y restricciones del sistema.</text><rect x="60" y="200" width="1200" height="56" rx="14" fill="#dcfce7" stroke="#334155" stroke-width="2"/><text x="90" y="223" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">2. Datos conocidos</text><text x="430" y="223" font-family="Arial" font-size="15.5" fill="#334155">Separar parámetros, unidades, límites y supuestos.</text><rect x="60" y="282" width="1200" height="56" rx="14" fill="#fef3c7" stroke="#334155" stroke-width="2"/><text x="90" y="305" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">3. Variables de decisión</text><text x="430" y="305" font-family="Arial" font-size="15.5" fill="#334155">Definir qué puede cambiar el modelo.</text><rect x="60" y="364" width="1200" height="56" rx="14" fill="#fce7f3" stroke="#334155" stroke-width="2"/><text x="90" y="387" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">4. Función objetivo</text><text x="430" y="387" font-family="Arial" font-size="15.5" fill="#334155">Expresar el criterio de minimización o maximización.</text><rect x="60" y="446" width="1200" height="56" rx="14" fill="#ede9fe" stroke="#334155" stroke-width="2"/><text x="90" y="469" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">5. Restricciones</text><text x="430" y="469" font-family="Arial" font-size="15.5" fill="#334155">Representar balances, límites y relaciones técnicas.</text><rect x="60" y="528" width="1200" height="56" rx="14" fill="#ffedd5" stroke="#334155" stroke-width="2"/><text x="90" y="551" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">6. Interpretación</text><text x="430" y="551" font-family="Arial" font-size="15.5" fill="#334155">Traducir la solución a una decisión de ingeniería.</text></svg>
