<text x="720" y="225" font-family="Arial" font-size="17" fill="#334155">• Restricción activa: holgura cero</text>
<text x="720" y="255" font-family="Arial" font-size="17" fill="#334155">• Vértice: intersección de restricciones</text>
<text x="720" y="285" font-family="Arial" font-size="17" fill="#334155">• Precio sombra: valor marginal del recurso</text>
<text x="720" y="315" font-family="Arial" font-size="17" fill="#334155">• Sensibilidad: robustez ante cambios de datos</text>
