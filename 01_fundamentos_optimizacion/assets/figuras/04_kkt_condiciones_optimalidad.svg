<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760">
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="70" y="55" font-family="Arial" font-size="34" font-weight="bold" fill="#0f172a">Condiciones KKT y lectura de optimalidad</text>
<text x="70" y="88" font-family="Arial" font-size="18" fill="#475569">Factibilidad, multiplicadores y complementariedad para problemas con restricciones</text>
<rect x="90" y="135" width="500" height="470" rx="24" fill="#eff6ff" stroke="#1e40af" stroke-width="3"/>
<text x="130" y="185" font-family="Arial" font-size="24" font-weight="bold" fill="#1e3a8a">Problema restringido</text>
<text x="130" y="235" font-family="Arial" font-size="22" fill="#0f172a">min f(x)</text>
<text x="130" y="280" font-family="Arial" font-size="22" fill="#0f172a">s.a. gᵢ(x) ≤ 0</text>
<text x="130" y="325" font-family="Arial" font-size="22" fill="#0f172a">hⱼ(x) = 0</text>
<text x="130" y="395" font-family="Arial" font-size="18" fill="#334155">Lagrangiano:</text>
<text x="130" y="430" font-family="Arial" font-size="18" fill="#334155">L = f + Σλᵢgᵢ + Σμⱼhⱼ</text>
<rect x="700" y="120" width="520" height="105" rx="18" fill="#dcfce7" stroke="#166534" stroke-width="3"/>
<text x="735" y="165" font-family="Arial" font-size="22" font-weight="bold" fill="#14532d">1. Factibilidad primal</text>
<text x="735" y="195" font-family="Arial" font-size="17" fill="#334155">La solución cumple restricciones de igualdad y desigualdad.</text>
<rect x="700" y="250" width="520" height="105" rx="18" fill="#fef3c7" stroke="#854d0e" stroke-width="3"/>
<text x="735" y="295" font-family="Arial" font-size="22" font-weight="bold" fill="#713f12">2. Factibilidad dual</text>
<text x="735" y="325" font-family="Arial" font-size="17" fill="#334155">Los multiplicadores de desigualdad son no negativos.</text>
<rect x="700" y="380" width="520" height="105" rx="18" fill="#fce7f3" stroke="#9d174d" stroke-width="3"/>
<text x="735" y="425" font-family="Arial" font-size="22" font-weight="bold" fill="#831843">3. Estacionariedad</text>
<text x="735" y="455" font-family="Arial" font-size="17" fill="#334155">El gradiente del Lagrangiano se anula en el óptimo.</text>
<rect x="700" y="510" width="520" height="105" rx="18" fill="#ede9fe" stroke="#6d28d9" stroke-width="3"/>
<text x="735" y="555" font-family="Arial" font-size="22" font-weight="bold" fill="#4c1d95">4. Complementariedad</text>
<text x="735" y="585" font-family="Arial" font-size="17" fill="#334155">Restricción no activa implica multiplicador igual a cero.</text>
</svg>
