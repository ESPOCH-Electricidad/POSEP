<text x="120" y="485" font-family="Arial" font-size="24" font-weight="bold" fill="#0f172a">Idea central del curso</text>
<text x="120" y="530" font-family="Arial" font-size="20" fill="#334155">Un sistema eléctrico se opera en el corto plazo, pero se planifica con información incierta de largo plazo.</text>
<text x="120" y="570" font-family="Arial" font-size="20" fill="#334155">La optimización conecta datos, restricciones físicas, costos, confiabilidad y decisiones de inversión.</text>
