<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="60" y="55" font-family="Arial" font-size="34" font-weight="bold" fill="#0f172a">Operación y planificación</text>
<text x="60" y="88" font-family="Arial" font-size="18" fill="#475569">Dos niveles de decisión conectados por datos, modelos y restricciones</text>

<rect x="100" y="160" width="480" height="380" rx="24" fill="#eff6ff" stroke="#1e40af" stroke-width="3"/>
<text x="135" y="215" font-family="Arial" font-size="28" font-weight="bold" fill="#1e3a8a">Operación</text>
<text x="135" y="270" font-family="Arial" font-size="19" fill="#334155">• demanda conocida o pronosticada de corto plazo</text>
<text x="135" y="315" font-family="Arial" font-size="19" fill="#334155">• despacho económico</text>
<text x="135" y="360" font-family="Arial" font-size="19" fill="#334155">• unit commitment</text>
<text x="135" y="405" font-family="Arial" font-size="19" fill="#334155">• OPF y congestión</text>
<text x="135" y="450" font-family="Arial" font-size="19" fill="#334155">• reserva y seguridad operativa</text>
<rect x="700" y="160" width="480" height="380" rx="24" fill="#fff7ed" stroke="#9a3412" stroke-width="3"/>
<text x="735" y="215" font-family="Arial" font-size="28" font-weight="bold" fill="#7c2d12">Planificación</text>
<text x="735" y="270" font-family="Arial" font-size="19" fill="#334155">• demanda futura y escenarios</text>
<text x="735" y="315" font-family="Arial" font-size="19" fill="#334155">• expansión de transmisión</text>
<text x="735" y="360" font-family="Arial" font-size="19" fill="#334155">• expansión de generación</text>
<text x="735" y="405" font-family="Arial" font-size="19" fill="#334155">• inversión y confiabilidad</text>
<text x="735" y="450" font-family="Arial" font-size="19" fill="#334155">• horizonte multianual</text>
<line x1="590" y1="350" x2="690" y2="350" stroke="#334155" stroke-width="4" stroke-dasharray="12,8"/>
<polygon points="690,350 665,335 665,365" fill="#334155"/>

</svg>
