azo</text><text x="960" y="186" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#0F172A">GEP</text><text x="960" y="322" text-anchor="middle" font-family="Arial" font-size="15" fill="#334155">Nueva generación</text>
