<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="720" viewBox="0 0 1300 720">

<rect width="1300" height="720" fill="#ffffff"/>
<text x="60" y="60" font-family="Arial" font-size="32" font-weight="bold">Estructuras de datos en AMPL</text>
<text x="60" y="95" font-family="Arial" font-size="18" fill="#475569">Un mismo modelo puede resolverse con distintos casos cambiando solo los datos.</text>
<g font-family="Arial">
<rect x="80" y="170" width="250" height="120" rx="16" fill="#eff6ff" stroke="#1e40af" stroke-width="3"/><text x="110" y="215" font-size="22" font-weight="bold">set G</text><text x="110" y="252" font-size="16">conjunto de generadores</text>
<rect x="390" y="170" width="250" height="120" rx="16" fill="#fef3c7" stroke="#854d0e" stroke-width="3"/><text x="420" y="215" font-size="22" font-weight="bold">param Cost{G}</text><text x="420" y="252" font-size="16">vector indexado</text>
<rect x="700" y="170" width="250" height="120" rx="16" fill="#dcfce7" stroke="#166534" stroke-width="3"/><text x="730" y="215" font-size="22" font-weight="bold">param X{L}</text><text x="730" y="252" font-size="16">datos de líneas</text>
<rect x="1010" y="170" width="220" height="120" rx="16" fill="#fce7f3" stroke="#9d174d" stroke-width="3"/><text x="1040" y="215" font-size="22" font-weight="bold">table</text><text x="1040" y="252" font-size="16">Excel/CSV</text>
<rect x="150" y="420" width="1000" height="160" rx="18" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
<text x="185" y="470" font-size="20" font-weight="bold">Regla docente</text>
<text x="185" y="515" font-size="18">Cada parámetro debe tener: nombre, índice, unidad, significado y tabla de valores.</text>
<text x="185" y="555" font-size="18">Si un estudiante no puede construir el .dat desde el README, faltan datos.</text>
</g>

</svg>
