<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="478" viewBox="0 0 1320 478"><rect width="100%" height="100%" fill="#ffffff"/><text x="60" y="52" font-family="Arial" font-size="34" font-weight="bold" fill="#0f172a">OPF-DC</text><text x="60" y="84" font-family="Arial" font-size="18" fill="#475569">Relación lineal entre flujo y diferencia angular</text><rect x="60" y="118" width="1200" height="56" rx="14" fill="#dbeafe" stroke="#334155" stroke-width="2"/><text x="90" y="141" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">1. Ángulos</text><text x="430" y="141" font-family="Arial" font-size="15.5" fill="#334155">Variables θ_i por barra.</text><rect x="60" y="200" width="1200" height="56" rx="14" fill="#dcfce7" stroke="#334155" stroke-width="2"/><text x="90" y="223" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">2. Reactancia</text><text x="430" y="223" font-family="Arial" font-size="15.5" fill="#334155">Parámetro x_l de cada línea.</text><rect x="60" y="282" width="1200" height="56" rx="14" fill="#fef3c7" stroke="#334155" stroke-width="2"/><text x="90" y="305" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">3. Flujo</text><text x="430" y="305" font-family="Arial" font-size="15.5" fill="#334155">F_l = (θ_i - θ_j)/x_l.</text><rect x="60" y="364" width="1200" height="56" rx="14" fill="#fce7f3" stroke="#334155" stroke-width="2"/><text x="90" y="387" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">4. Límite térmico</text><text x="430" y="387" font-family="Arial" font-size="15.5" fill="#334155">Restricción de capacidad de línea.</text></svg>
