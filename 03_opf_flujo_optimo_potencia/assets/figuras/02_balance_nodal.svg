<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="478" viewBox="0 0 1320 478"><rect width="100%" height="100%" fill="#ffffff"/><text x="60" y="52" font-family="Arial" font-size="34" font-weight="bold" fill="#0f172a">Balance nodal</text><text x="60" y="84" font-family="Arial" font-size="18" fill="#475569">Cada barra debe cerrar potencia inyectada y retirada</text><rect x="60" y="118" width="1200" height="56" rx="14" fill="#dbeafe" stroke="#334155" stroke-width="2"/><text x="90" y="141" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">1. Generación local</text><text x="430" y="141" font-family="Arial" font-size="15.5" fill="#334155">Potencia producida en la barra.</text><rect x="60" y="200" width="1200" height="56" rx="14" fill="#dcfce7" stroke="#334155" stroke-width="2"/><text x="90" y="223" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">2. Demanda local</text><text x="430" y="223" font-family="Arial" font-size="15.5" fill="#334155">Carga activa y reactiva.</text><rect x="60" y="282" width="1200" height="56" rx="14" fill="#fef3c7" stroke="#334155" stroke-width="2"/><text x="90" y="305" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">3. Flujos incidentes</text><text x="430" y="305" font-family="Arial" font-size="15.5" fill="#334155">Potencia que entra o sale por líneas.</text><rect x="60" y="364" width="1200" height="56" rx="14" fill="#fce7f3" stroke="#334155" stroke-width="2"/><text x="90" y="387" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">4. ENS</text><text x="430" y="387" font-family="Arial" font-size="15.5" fill="#334155">Variable de penalización si no se cubre demanda.</text></svg>
