<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="560" viewBox="0 0 1320 560"><rect width="100%" height="100%" fill="#ffffff"/><text x="60" y="52" font-family="Arial" font-size="34" font-weight="bold" fill="#0f172a">Del despacho económico al OPF</text><text x="60" y="84" font-family="Arial" font-size="18" fill="#475569">La red convierte el problema de costo en un problema físico-económico</text><rect x="60" y="118" width="1200" height="56" rx="14" fill="#dbeafe" stroke="#334155" stroke-width="2"/><text x="90" y="141" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">1. Despacho económico</text><text x="430" y="141" font-family="Arial" font-size="15.5" fill="#334155">Balance agregado sin ubicación.</text><rect x="60" y="200" width="1200" height="56" rx="14" fill="#dcfce7" stroke="#334155" stroke-width="2"/><text x="90" y="223" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">2. Red de transmisión</text><text x="430" y="223" font-family="Arial" font-size="15.5" fill="#334155">Barras, líneas, impedancias y límites.</text><rect x="60" y="282" width="1200" height="56" rx="14" fill="#fef3c7" stroke="#334155" stroke-width="2"/><text x="90" y="305" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">3. Balance nodal</text><text x="430" y="305" font-family="Arial" font-size="15.5" fill="#334155">Cada barra equilibra inyecciones y retiros.</text><rect x="60" y="364" width="1200" height="56" rx="14" fill="#fce7f3" stroke="#334155" stroke-width="2"/><text x="90" y="387" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">4. Congestión</text><text x="430" y="387" font-family="Arial" font-size="15.5" fill="#334155">Los límites de línea modifican el despacho.</text><rect x="60" y="446" width="1200" height="56" rx="14" fill="#ede9fe" stroke="#334155" stroke-width="2"/><text x="90" y="469" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">5. OPF</text><text x="430" y="469" font-family="Arial" font-size="15.5" fill="#334155">Costo mínimo sujeto a restricciones eléctricas.</text></svg>
