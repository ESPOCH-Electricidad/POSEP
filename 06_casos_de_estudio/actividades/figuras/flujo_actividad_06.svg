<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="690" viewBox="0 0 1100 690">
    <rect width="100%" height="100%" fill="#FFFFFF"/>
    <text x="60" y="55" font-family="Arial" font-size="34" font-weight="bold" fill="#0F172A">Actividad 06 — Casos integradores</text>
    <text x="60" y="85" font-family="Arial" font-size="18" fill="#475569">Flujo esperado de trabajo para el estudiante</text>
    
        <rect x="60" y="110" width="980" height="72" rx="16" fill="#DCFCE7" stroke="#334155" stroke-width="2"/>
        <text x="90" y="138" font-family="Arial" font-size="22" font-weight="bold" fill="#111827">1. Elegir caso</text>
        <text x="90" y="166" font-family="Arial" font-size="18" fill="#334155">Sistema didactico, Garver, IEEE 14 o IEEE 24</text>
        
            <line x1="550" y1="182" x2="550" y2="215" stroke="#475569" stroke-width="3"/>
            <polygon points="540,210 560,210 550,226" fill="#475569"/>
            
        <rect x="60" y="220" width="980" height="72" rx="16" fill="#FEF3C7" stroke="#334155" stroke-width="2"/>
        <text x="90" y="248" font-family="Arial" font-size="22" font-weight="bold" fill="#111827">2. Seleccionar modelo</text>
        <text x="90" y="276" font-family="Arial" font-size="18" fill="#334155">ED, UC, OPF, TNEP o GEP segun pregunta tecnica</text>
        
            <line x1="550" y1="292" x2="550" y2="325" stroke="#475569" stroke-width="3"/>
            <polygon points="540,320 560,320 550,336" fill="#475569"/>
            
        <rect x="60" y="330" width="980" height="72" rx="16" fill="#FCE7F3" stroke="#334155" stroke-width="2"/>
        <text x="90" y="358" font-family="Arial" font-size="22" font-weight="bold" fill="#111827">3. Construir AMPL</text>
        <text x="90" y="386" font-family="Arial" font-size="18" fill="#334155">Datos, formulacion, ejecucion y salida</text>
        
            <line x1="550" y1="402" x2="550" y2="435" stroke="#475569" stroke-width="3"/>
            <polygon points="540,430 560,430 550,446" fill="#475569"/>
            
        <rect x="60" y="440" width="980" height="72" rx="16" fill="#EDE9FE" stroke="#334155" stroke-width="2"/>
        <text x="90" y="468" font-family="Arial" font-size="22" font-weight="bold" fill="#111827">4. Comparar escenarios</text>
        <text x="90" y="496" font-family="Arial" font-size="18" fill="#334155">Caso base frente a modificacion o extension</text>
        
            <line x1="550" y1="512" x2="550" y2="545" stroke="#475569" stroke-width="3"/>
            <polygon points="540,540 560,540 550,556" fill="#475569"/>
            
        <rect x="60" y="550" width="980" height="72" rx="16" fill="#FFEDD5" stroke="#334155" stroke-width="2"/>
        <text x="90" y="578" font-family="Arial" font-size="22" font-weight="bold" fill="#111827">5. Defender resultados</text>
        <text x="90" y="606" font-family="Arial" font-size="18" fill="#334155">Informe tecnico, Excel y recomendaciones</text>
        
    </svg>