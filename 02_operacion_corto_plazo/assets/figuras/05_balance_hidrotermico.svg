<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="560" viewBox="0 0 1320 560"><rect width="100%" height="100%" fill="#ffffff"/><text x="60" y="52" font-family="Arial" font-size="34" font-weight="bold" fill="#0f172a">Despacho hidrotérmico</text><text x="60" y="84" font-family="Arial" font-size="18" fill="#475569">El agua tiene valor presente y futuro</text><rect x="60" y="118" width="1200" height="56" rx="14" fill="#dbeafe" stroke="#334155" stroke-width="2"/><text x="90" y="141" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">1. Afluencia</text><text x="430" y="141" font-family="Arial" font-size="15.5" fill="#334155">Entrada natural al embalse.</text><rect x="60" y="200" width="1200" height="56" rx="14" fill="#dcfce7" stroke="#334155" stroke-width="2"/><text x="90" y="223" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">2. Volumen</text><text x="430" y="223" font-family="Arial" font-size="15.5" fill="#334155">Estado intertemporal del sistema hidráulico.</text><rect x="60" y="282" width="1200" height="56" rx="14" fill="#fef3c7" stroke="#334155" stroke-width="2"/><text x="90" y="305" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">3. Turbinamiento</text><text x="430" y="305" font-family="Arial" font-size="15.5" fill="#334155">Agua convertida en generación.</text><rect x="60" y="364" width="1200" height="56" rx="14" fill="#fce7f3" stroke="#334155" stroke-width="2"/><text x="90" y="387" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">4. Vertimiento</text><text x="430" y="387" font-family="Arial" font-size="15.5" fill="#334155">Agua no utilizada.</text><rect x="60" y="446" width="1200" height="56" rx="14" fill="#ede9fe" stroke="#334155" stroke-width="2"/><text x="90" y="469" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">5. Térmica</text><text x="430" y="469" font-family="Arial" font-size="15.5" fill="#334155">Complementa la generación cuando el agua es limitada.</text></svg>
