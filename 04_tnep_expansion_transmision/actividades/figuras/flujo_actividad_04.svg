<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="690" viewBox="0 0 1100 690">
    <rect width="100%" height="100%" fill="#FFFFFF"/>
    <text x="60" y="55" font-family="Arial" font-size="34" font-weight="bold" fill="#0F172A">Actividad 04 — TNEP</text>
    <text x="60" y="85" font-family="Arial" font-size="18" fill="#475569">Flujo esperado de trabajo para el estudiante</text>
    
        <rect x="60" y="110" width="980" height="72" rx="16" fill="#DCFCE7" stroke="#334155" stroke-width="2"/>
        <text x="90" y="138" font-family="Arial" font-size="22" font-weight="bold" fill="#111827">1. Construir datos de red</text>
        <text x="90" y="166" font-family="Arial" font-size="18" fill="#334155">Barras, demanda, generacion y corredores</text>
        
            <line x1="550" y1="182" x2="550" y2="215" stroke="#475569" stroke-width="3"/>
            <polygon points="540,210 560,210 550,226" fill="#475569"/>
            
        <rect x="60" y="220" width="980" height="72" rx="16" fill="#FEF3C7" stroke="#334155" stroke-width="2"/>
        <text x="90" y="248" font-family="Arial" font-size="22" font-weight="bold" fill="#111827">2. Formular 4 modelos</text>
        <text x="90" y="276" font-family="Arial" font-size="18" fill="#334155">Transporte, DC, hibrido y lineal disyuntivo</text>
        
            <line x1="550" y1="292" x2="550" y2="325" stroke="#475569" stroke-width="3"/>
            <polygon points="540,320 560,320 550,336" fill="#475569"/>
            
        <rect x="60" y="330" width="980" height="72" rx="16" fill="#FCE7F3" stroke="#334155" stroke-width="2"/>
        <text x="90" y="358" font-family="Arial" font-size="22" font-weight="bold" fill="#111827">3. Ejecutar escenarios</text>
        <text x="90" y="386" font-family="Arial" font-size="18" fill="#334155">Demanda, presupuesto, costos y capacidad</text>
        
            <line x1="550" y1="402" x2="550" y2="435" stroke="#475569" stroke-width="3"/>
            <polygon points="540,430 560,430 550,446" fill="#475569"/>
            
        <rect x="60" y="440" width="980" height="72" rx="16" fill="#EDE9FE" stroke="#334155" stroke-width="2"/>
        <text x="90" y="468" font-family="Arial" font-size="22" font-weight="bold" fill="#111827">4. Comparar inversion</text>
        <text x="90" y="496" font-family="Arial" font-size="18" fill="#334155">Circuitos construidos, ENS y costo total</text>
        
            <line x1="550" y1="512" x2="550" y2="545" stroke="#475569" stroke-width="3"/>
            <polygon points="540,540 560,540 550,556" fill="#475569"/>
            
        <rect x="60" y="550" width="980" height="72" rx="16" fill="#FFEDD5" stroke="#334155" stroke-width="2"/>
        <text x="90" y="578" font-family="Arial" font-size="22" font-weight="bold" fill="#111827">5. Redactar recomendaciones</text>
        <text x="90" y="606" font-family="Arial" font-size="18" fill="#334155">Formulacion mas adecuada para planificacion</text>
        
    </svg>