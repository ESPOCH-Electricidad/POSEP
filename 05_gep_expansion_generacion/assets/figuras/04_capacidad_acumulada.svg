<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="478" viewBox="0 0 1320 478"><rect width="100%" height="100%" fill="#ffffff"/><text x="60" y="52" font-family="Arial" font-size="34" font-weight="bold" fill="#0f172a">Capacidad acumulada</text><text x="60" y="84" font-family="Arial" font-size="18" fill="#475569">La inversión de un año afecta años posteriores</text><rect x="60" y="118" width="1200" height="56" rx="14" fill="#dbeafe" stroke="#334155" stroke-width="2"/><text x="90" y="141" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">1. Capacidad inicial</text><text x="430" y="141" font-family="Arial" font-size="15.5" fill="#334155">Parque existente.</text><rect x="60" y="200" width="1200" height="56" rx="14" fill="#dcfce7" stroke="#334155" stroke-width="2"/><text x="90" y="223" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">2. Nueva inversión</text><text x="430" y="223" font-family="Arial" font-size="15.5" fill="#334155">Build_k,y.</text><rect x="60" y="282" width="1200" height="56" rx="14" fill="#fef3c7" stroke="#334155" stroke-width="2"/><text x="90" y="305" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">3. Acumulación</text><text x="430" y="305" font-family="Arial" font-size="15.5" fill="#334155">Cap_k,y = Cap_k,y-1 + Build_k,y.</text><rect x="60" y="364" width="1200" height="56" rx="14" fill="#fce7f3" stroke="#334155" stroke-width="2"/><text x="90" y="387" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a">4. Retiro</text><text x="430" y="387" font-family="Arial" font-size="15.5" fill="#334155">Opcional según vida útil o política.</text></svg>
